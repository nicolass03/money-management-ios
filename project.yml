name: MoneyManagement
options:
  bundleIdPrefix: com.nicolass03
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
targets:
  SpendflyShared:
    type: framework
    platform: iOS
    sources:
      - path: SpendflyShared
      - path: MoneyManagement/Resources/Fonts/JetBrainsMono-Regular.ttf
        buildPhase: resources
      - path: MoneyManagement/Resources/Fonts/JetBrainsMono-Medium.ttf
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolass03.spendfly.shared
        PRODUCT_NAME: SpendflyShared
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
  MoneyManagement:
    type: application
    platform: iOS
    sources:
      - path: MoneyManagement
        excludes:
          - Resources/Info.plist
    resources:
      - path: MoneyManagement/Resources/Assets.xcassets
      - path: MoneyManagement/Resources/Fonts
      - path: MoneyManagement/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolass03.spendfly
        PRODUCT_NAME: Spendfly
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: MoneyManagement/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: MoneyManagement/MoneyManagement.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - target: SpendflyShared
        embed: true
      - target: SpendflyWidgets
        embed: true
  SpendflyWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SpendflyWidgets
        excludes:
          - Info.plist
      - path: MoneyManagement/Resources/Fonts/JetBrainsMono-Regular.ttf
        buildPhase: resources
      - path: MoneyManagement/Resources/Fonts/JetBrainsMono-Medium.ttf
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolass03.spendfly.SpendflyWidgets
        PRODUCT_NAME: SpendflyWidgets
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SpendflyWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: SpendflyWidgets/SpendflyWidgets.entitlements
    dependencies:
      - target: SpendflyShared
        embed: true

schemes:
  MoneyManagement:
    build:
      targets:
        MoneyManagement: all
        SpendflyWidgets: all
        SpendflyShared: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  SpendflyWidgets:
    build:
      targets:
        SpendflyWidgets: all
        MoneyManagement: all
        SpendflyShared: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: MonthSpentWidget
        _XCWidgetDefaultView: timeline
        _XCWidgetFamily: systemSmall
  SpendflyWidgets-ExtraSpent:
    build:
      targets:
        SpendflyWidgets: all
        MoneyManagement: all
        SpendflyShared: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: ExtraSpentWidget
        _XCWidgetDefaultView: timeline
        _XCWidgetFamily: systemSmall
