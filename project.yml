name: MoneyManagement
options:
  bundleIdPrefix: com.nicolass03
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
targets:
  MoneyManagement:
    type: application
    platform: iOS
    sources:
      - path: MoneyManagement
        excludes:
          - Resources/Info.plist
    resources:
      - path: MoneyManagement/Resources/Assets.xcassets
      - path: MoneyManagement/Resources/Fonts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolass03.spendfly
        PRODUCT_NAME: Spendfly
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: MoneyManagement/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Supabase
        product: Supabase
